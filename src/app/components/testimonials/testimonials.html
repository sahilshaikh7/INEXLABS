<section id="testimonials" class="relative py-24 sm:py-32">
  <div
    class="pointer-events-none absolute left-1/2 top-1/3 h-72 w-[36rem] -translate-x-1/2 rounded-full bg-accent/10 blur-[120px]"
  ></div>
  <div class="relative mx-auto max-w-4xl px-4 sm:px-6">
    <div appReveal class="mx-auto max-w-2xl text-center">
      <h2 class="text-sm font-medium uppercase tracking-widest text-primary">
        Our Team
      </h2>
      <!-- <h2
        class="mt-4 text-balance text-3xl font-semibold tracking-tight sm:text-4xl"
      >
        Trusted by security leaders worldwide
      </h2> -->
    </div>

    <div appReveal class="relative mt-14">
      <div
        class="overflow-hidden rounded-3xl glass border border-border p-8 shadow-glow-sm sm:p-12"
      >
        <svg lucideQuote class="h-10 w-10 text-primary/60"></svg>
        <div class="relative mt-6 min-h-[10rem]">
          @for (t of testimonials; track t.name; let i = $index) {
            <blockquote
              [class]="
                cn(
                  'transition-all duration-500',
                  i === active()
                    ? 'relative opacity-100'
                    : 'pointer-events-none absolute inset-0 translate-y-4 opacity-0'
                )
              "
            >
              <p
                class="text-pretty text-lg leading-relaxed text-foreground sm:text-xl"
              >
                “{{ t.review }}”
              </p>
              <footer class="mt-7 flex items-center gap-4">
                <img
                  [src]="t.avatar || '/placeholder.svg'"
                  [alt]="t.name"
                  width="56"
                  height="56"
                  class="h-14 w-14 rounded-full border border-border object-cover"
                />
                <div>
                  <p class="font-semibold">{{ t.name }}</p>
                  <p class="text-sm text-muted-foreground">{{ t.company }}</p>
                  <div class="mt-1 flex gap-0.5">
                    @for (s of stars(t.rating); track s) {
                      <svg lucideStar class="h-4 w-4 fill-accent text-accent"></svg>
                    }
                  </div>
                </div>
              </footer>
            </blockquote>
          }
        </div>
      </div>

      <div class="mt-8 flex items-center justify-center gap-4">
        <button
          (click)="go(-1)"
          aria-label="Previous testimonial"
          class="inline-flex h-11 w-11 items-center justify-center rounded-full glass border border-border transition-colors hover:border-primary/50"
        >
          <svg lucideChevronLeft class="h-5 w-5"></svg>
        </button>
        <div class="flex gap-2">
          @for (t of testimonials; track $index; let i = $index) {
            <button
              (click)="setActive(i)"
              [attr.aria-label]="'Go to testimonial ' + (i + 1)"
              [class]="
                cn(
                  'h-2 rounded-full transition-all',
                  i === active()
                    ? 'w-8 bg-primary shadow-glow-sm'
                    : 'w-2 bg-muted-foreground/40 hover:bg-muted-foreground'
                )
              "
            ></button>
          }
        </div>
        <button
          (click)="go(1)"
          aria-label="Next testimonial"
          class="inline-flex h-11 w-11 items-center justify-center rounded-full glass border border-border transition-colors hover:border-primary/50"
        >
          <svg lucideChevronRight class="h-5 w-5"></svg>
        </button>
      </div>
    </div>
  </div>
</section>
