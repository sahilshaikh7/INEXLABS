<header
  [class]="
    cn(
      'fixed inset-x-0 top-0 z-50 transition-all duration-300',
      scrolled() ? 'py-2.5' : 'py-4'
    )
  "
>
  <nav
    [class]="
      cn(
        'mx-auto flex max-w-6xl items-center justify-between rounded-full px-4 py-2.5 transition-all duration-300 sm:px-6',
        scrolled()
          ? 'glass border border-border shadow-glow-sm'
          : 'border border-transparent'
      )
    "
  >
    <a
      href="#home"
      (click)="navigate($event, '#home')"
      class="flex items-center gap-2.5"
      data-cursor="hover"
    >
      <app-brand
        logoClass="h-14 w-14"
        textClass="text-[28px] font-semibold tracking-tight text-white/100"
      />
    </a>

    <div class="hidden items-center gap-8 md:flex">
      @for (l of links; track l.href) {
        <a
          [href]="l.href"
          (click)="navigate($event, l.href)"
          data-cursor="hover"
          class="text-[20px] text-white/75 transition-colors hover:text-white/90"
        >
          {{ l.label }}
        </a>
      }
    </div>

    <div class="hidden md:block">
      <a
        href="#contact"
        (click)="navigate($event, '#contact')"
        data-magnetic="0.45"
        data-cursor="hover"
        class="group inline-flex items-center gap-2 rounded-full bg-[var(--cyber-blue)] px-6 py-3 text-lg font-medium text-white shadow-glow transition-transform hover:scale-105"
      >
        <svg lucideShield class="h-4 w-4"></svg>
        Contact Us
      </a>
    </div>

    <button
      (click)="toggle()"
      class="inline-flex h-10 w-10 items-center justify-center rounded-full glass border border-border md:hidden"
      aria-label="Toggle menu"
    >
      @if (open()) {
        <svg lucideX class="h-5 w-5"></svg>
      } @else {
        <svg lucideMenu class="h-5 w-5"></svg>
      }
    </button>
  </nav>

  @if (open()) {
    <div class="mx-auto mt-2 max-w-6xl px-4 md:hidden">
      <div class="glass flex flex-col gap-1 rounded-2xl border border-border p-3">
        @for (l of links; track l.href) {
          <a
            [href]="l.href"
            (click)="navigate($event, l.href)"
            class="rounded-lg px-4 py-3 text-[18px] text-white/75 transition-colors hover:bg-white/10 hover:text-white/90"
          >
            {{ l.label }}
          </a>
        }
        <a
          href="#contact"
          (click)="navigate($event, '#contact')"
          class="mt-1 inline-flex items-center justify-center gap-2 rounded-lg bg-[var(--cyber-blue)] px-4 py-4 text-lg font-medium text-white"
        >
          <svg lucideShield class="h-4 w-4"></svg>
          Contact Us
        </a>
      </div>
    </div>
  }
</header>
