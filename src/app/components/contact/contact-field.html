<div class="group relative">
  <span
    class="pointer-events-none absolute left-3.5 top-3.5 text-muted-foreground transition-colors group-focus-within:text-primary"
  >
    @switch (icon()) {
      @case ('user') {
        <svg lucideUser class="h-4 w-4"></svg>
      }
      @case ('mail') {
        <svg lucideMail class="h-4 w-4"></svg>
      }
      @case ('phone') {
        <svg lucidePhone class="h-4 w-4"></svg>
      }
      @case ('building2') {
        <svg lucideBuilding2 class="h-4 w-4"></svg>
      }
      @case ('messageSquare') {
        <svg lucideMessageSquare class="h-4 w-4"></svg>
      }
    }
  </span>
  @if (textarea()) {
    <textarea
      [id]="id()"
      [name]="id()"
      [required]="required()"
      rows="4"
      placeholder=" "
      class="peer w-full resize-none rounded-xl border border-input bg-secondary/40 px-10 pb-2 pt-6 text-sm outline-none transition-all focus:border-primary/60 focus:shadow-glow-sm"
    ></textarea>
  } @else {
    <input
      [id]="id()"
      [name]="id()"
      [type]="type()"
      [required]="required()"
      placeholder=" "
      class="peer w-full rounded-xl border border-input bg-secondary/40 px-10 pb-2 pt-6 text-sm outline-none transition-all focus:border-primary/60 focus:shadow-glow-sm"
    />
  }
  <label
    [for]="id()"
    class="pointer-events-none absolute left-10 top-4 text-sm text-muted-foreground transition-all duration-200 peer-focus:top-2 peer-focus:text-xs peer-focus:text-primary peer-[:not(:placeholder-shown)]:top-2 peer-[:not(:placeholder-shown)]:text-xs"
  >
    {{ label() }}
  </label>
</div>
